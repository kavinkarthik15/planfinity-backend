services:
  - type: web
    name: planfinity-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        value: firebase_key.json
      - key: CORS_ORIGINS
        value: "*"
